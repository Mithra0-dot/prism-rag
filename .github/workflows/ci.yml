# ─────────────────────────────────────────────────────────────────────
# PRISM — GitHub Actions CI Pipeline
# Jobs: lint + test (Docker build removed)
# ─────────────────────────────────────────────────────────────────────

name: PRISM CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ── Job 1: Lint ────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check backend/ --select=E,F,W,I --ignore=E501

  # ── Job 2: Test ────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Create .env for tests
        run: |
          cp .env.example .env
          echo "ENVIRONMENT=development" >> .env
          echo "LLM_PROVIDER=ollama" >> .env
          echo "OPENAI_API_KEY=test-key" >> .env

      - name: Create data directories
        run: mkdir -p data/uploads data/chroma_db data/mlflow data/logs

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --cov=backend \
            --cov-report=term-missing \
            -v \
            --tb=short
        env:
          ENVIRONMENT: development
          LLM_PROVIDER: ollama